<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil</title>
  <link rel="stylesheet" href="css/perfilStyles.css" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

  <div class="profile-container">

    <!-- PORTADA -->
    <div class="cover">
      <img src="https://picsum.photos/1200/400?1" alt="Portada">

      <div class="cover-btn">
        <i class="bi bi-camera-fill"></i>
      </div>

      <div class="note-bubble">
        Comparte una nota...
      </div>
    </div>

    <!-- INFO PERFIL -->
    <div class="profile-info">

      <div class="profile-img-container">
        <img src="https://picsum.photos/200?2" alt="Perfil" class="profile-img">

        <div class="profile-btn">
          <i class="bi bi-camera-fill"></i>
        </div>
      </div>

      <div class="profile-text">
        <h1>Sebastian Rios</h1>
        <p>259 amigos · 3 publicaciones</p>
      </div>

    </div>

    <!-- NAV PERFIL -->
<div class="profile-nav">
  <ul>
    <li class="active">Publicaciones</li>
    <li>Fotos</li>
    <li>Videos</li>
    <li>Amigos</li>
    <li>Información</li>
  </ul>
</div>




    <!-- PUBLICACIONES -->
<div class="posts">

  <div class="post">

    <!-- HEADER DEL POST -->
    <div class="post-header">
      <img src="https://picsum.photos/50?1" class="user-img">
      <div>
        <h4>Sebastian Rios</h4>
        <span>Hace 2 horas</span>
      </div>
    </div>

    <!-- IMAGEN CON OVERLAY -->
    <div class="post-image">
      <img src="https://picsum.photos/600/400?3" alt="Publicación">

      <div class="overlay">
        <div class="stats">
          <span> 120</span>
          <span> 35</span>
        </div>
      </div>
    </div>

    <!-- TEXTO -->
    <div class="post-info">
      <p>buena foto</p>
    </div>

    <!-- BOTONES -->
    <div class="post-actions">
      <button> Me gusta</button>
      <button> Comentar</button>
      <button>↗ Compartir</button>
    </div>

    <!-- COMENTARIOS -->
    <div class="comments">
      <div class="comment">
        <strong>Juan:</strong> Qué buen lugar 
      </div>
      <div class="comment">
        <strong>Maria:</strong> Hermosa foto 
      </div>
    </div>

  </div>

</div>


</body>
</html>
